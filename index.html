<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEN ROBLOX SHOP | Dịch Vụ Roblox Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .active-category { background-color: #2563eb !important; border-color: #3b82f6 !important; }
        ::-webkit-scrollbar { display: none; } /* Ẩn thanh cuộn cho mượt */
    </style>
</head>
<body>

    <nav class="bg-slate-900/90 backdrop-blur-md sticky top-0 z-[100] p-4 border-b border-slate-800 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg"><i class="fas fa-bolt text-white text-sm"></i></div>
            <span class="text-lg font-black tracking-tighter uppercase">KEN<span class="text-blue-500">SHOP</span></span>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="text-right mr-2">
                <p id="display-id" class="text-[10px] font-mono font-bold text-slate-400">KEN5493</p>
                <p id="display-balance" class="text-xs text-green-400 font-black">0đ</p>
            </div>
            <button onclick="toggleAuthModal()" class="bg-blue-600 hover:bg-blue-700 p-2 px-3 rounded-xl text-xs font-bold transition">
                <i class="fas fa-user-circle mr-1"></i> LOGIN
            </button>
        </div>
    </nav>

    <header class="p-4">
        <div class="bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-900 rounded-3xl p-6 text-center shadow-2xl border border-white/10">
            <h1 class="text-2xl font-black mb-1 italic">DỊCH VỤ ROBLOX UY TÍN</h1>
            <p class="text-[10px] text-blue-200 uppercase tracking-widest opacity-80">Giao dịch an toàn - Hỗ trợ 24/7 bởi KenKaKa</p>
        </div>
    </header>

    <div class="px-4 mb-6">
        <h3 class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-widest"><i class="fas fa-list-ul mr-2"></i> Danh mục sản phẩm</h3>
        <div class="flex gap-3 overflow-x-auto pb-2">
            <button onclick="filterCategory('all')" class="active-category bg-slate-800 border border-slate-700 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Tất cả</button>
            <button onclick="filterCategory('blox-fruit')" class="bg-slate-800 border border-slate-700 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Acc Blox Fruit</button>
            <button onclick="filterCategory('robux')" class="bg-slate-800 border border-slate-700 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Robux 120h</button>
            <button onclick="filterCategory('CĐVN')" class="bg-slate-800 border border-slate-700 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">Cày Thuê</button>
            <button onclick="filterCategory('Discord')" class="bg-slate-800 border border-slate-700 px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap">King Legacy</button>
        </div>
    </div>

    <main class="px-4 pb-20">
        <div id="item-list" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-10 opacity-50">
                <i class="fas fa-box-open text-4xl mb-3"></i>
                <p class="text-sm">Chưa có món đồ nào... Admin hãy đăng đồ!</p>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl relative">
            <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-slate-500"><i class="fas fa-times"></i></button>
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-blue-500">XÁC MINH</h2>
                <p class="text-xs text-slate-500 italic">Đăng nhập để quản lý tài khoản</p>
            </div>

            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-slate-500"></i>
                    <input type="text" id="username" placeholder="Tài khoản" class="w-full bg-slate-800 border border-slate-700 p-3.5 pl-12 rounded-2xl text-sm focus:border-blue-500 outline-none">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-500"></i>
                    <input type="password" id="password" placeholder="Mật khẩu" class="w-full bg-slate-800 border border-slate-700 p-3.5 pl-12 rounded-2xl text-sm focus:border-blue-500 outline-none">
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button onclick="doLogin()" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-600/20">ĐĂNG NHẬP</button>
                    <button onclick="doRegister()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-bold text-sm border border-slate-700">ĐĂNG KÝ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DÁN FIREBASE CONFIG CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyAg43SSX_aLhhiXhO7hf1eHAZ-1OaeSd8M",
            authDomain: "kenshop-88903.firebaseapp.com",
            projectId: "kenshop-88903",
            storageBucket: "kenshop-88903.firebasestorage.app",
            messagingSenderId: "149286522818",
            appId: "1:149286522818:web:85fa1721635fdb85bb105b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Hiện modal
        function toggleAuthModal() {
            document.getElementById("auth-modal").classList.toggle("hidden");
        }

        // Tạm thời các hàm login/register chỉ để test GUI
        function doLogin() {
            const user = document.getElementById("username").value;
            if(user === "kenneku") {
                Swal.fire('Admin!', 'Chào Ken, chuyển hướng sang Admin Panel...', 'success');
                setTimeout(() => window.location.href='admin.html', 1500);
            } else {
                Swal.fire('Thông báo', 'Hệ thống đang bảo trì chức năng thành viên!', 'info');
            }
        }

        // Lọc theo danh mục
        function filterCategory(cat) {
            // Đổi màu nút active
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.classList.remove('active-category'));
            event.target.classList.add('active-category');
            
            // Logic lấy đồ từ Firestore theo Category
            loadItems(cat);
        }

        function loadItems(cat = 'all') {
            let query = db.collection("items").where("status", "==", "available");
            if(cat !== 'all') {
                query = query.where("category", "==", cat);
            }
            
            query.onSnapshot(snap => {
                const list = document.getElementById("item-list");
                if(snap.empty) {
                    list.innerHTML = `<div class="col-span-2 text-center py-10 opacity-50"><p class="text-sm">Hết hàng trong danh mục này!</p></div>`;
                    return;
                }
                list.innerHTML = "";
                snap.forEach(doc => {
                    const it = doc.data();
                    list.innerHTML += `
                        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl overflow-hidden shadow-lg shadow-black/50">
                            <img src="${it.image || 'https://via.placeholder.com/150'}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="text-xs font-bold truncate">${it.name}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-400 font-black text-xs">${it.price.toLocaleString()}đ</span>
                                    <button class="bg-blue-600 p-1.5 px-3 rounded-xl text-[10px] font-black uppercase">MUA</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }
        loadItems();
    </script>
</body>
</html>
