<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEN ROBLOX SHOP | Dịch Vụ Roblox Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-item:hover { transform: scale(1.02); transition: 0.3s; }
    </style>
</head>
<body>
    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-bolt text-white"></i></div>
            <span class="text-xl font-black tracking-tighter">KEN<span class="text-blue-500">SHOP</span></span>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">ID Người dùng</p>
            <p id="display-id" class="text-sm font-mono font-bold text-white">Đang tải...</p>
            <p id="display-balance" class="text-xs text-green-400 font-bold">0đ</p>
        </div>
    </nav>

    <header class="p-6">
        <div class="bg-gradient-to-br from-blue-700 to-indigo-900 p-8 rounded-3xl shadow-xl relative overflow-hidden text-center">
            <h1 class="text-3xl font-black mb-2 uppercase italic">Hệ Thống Bán Acc Tự Động</h1>
            <p class="text-blue-200">Giao dịch an toàn - Hỗ trợ 24/7 bởi KenKaKa</p>
        </div>
    </header>

    <section class="px-6 mb-8">
        <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 border-green-500">
            <div>
                <p class="text-xs text-slate-400">Nội dung nạp Bank:</p>
                <p id="syntax" class="text-sm font-bold text-yellow-400 uppercase tracking-wider">napbankkenshop ...</p>
            </div>
            <button onclick="showQR()" class="bg-slate-700 p-3 rounded-xl hover:bg-slate-600 transition"><i class="fas fa-qrcode"></i></button>
        </div>
    </section>

    <main class="p-6">
        <div id="item-list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <script>
        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyAg43SSX_aLhhiXhO7hf1eHAZ-1OaeSd8M",
            authDomain: "kenshop-88903.firebaseapp.com",
            projectId: "kenshop-88903",
            storageBucket: "kenshop-88903.firebasestorage.app",
            messagingSenderId: "149286522818",
            appId: "1:149286522818:web:85fa1721635fdb85bb105b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Quản lý ID & Số dư
        let myId = localStorage.getItem("kenshop_id");
        if(!myId) {
            myId = "KEN" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem("kenshop_id", myId);
        }
        document.getElementById("display-id").innerText = myId;
        document.getElementById("syntax").innerText = "napbankkenshop " + myId;

        // Lấy số dư từ Firebase
        function loadBalance() {
            db.collection("users").doc(myId).onSnapshot((doc) => {
                if(doc.exists) {
                    document.getElementById("display-balance").innerText = doc.data().balance.toLocaleString() + "đ";
                } else {
                    db.collection("users").doc(myId).set({ balance: 0, role: "user" });
                }
            });
        }
        loadBalance();

        // 2. Load danh sách đồ
        db.collection("items").where("status", "in", ["available", "pending"]).onSnapshot((snapshot) => {
            const list = document.getElementById("item-list");
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const item = doc.data();
                const isPending = item.status === "pending";
                list.innerHTML += `
                    <div class="card-item glass rounded-2xl overflow-hidden shadow-lg border border-slate-700">
                        <img src="${item.image}" class="w-full h-32 object-cover">
                        <div class="p-3">
                            <h3 class="font-bold text-sm truncate text-white">${item.name}</h3>
                            <p class="text-blue-400 font-black text-sm my-1">${item.price.toLocaleString()}đ</p>
                            ${isPending ? 
                                `<div class="bg-orange-500/20 text-orange-500 text-[10px] py-1 px-2 rounded text-center font-bold">ĐANG CHỜ XÁC NHẬN</div>` : 
                                `<button onclick="buyNow('${doc.id}', '${item.name}', ${item.price})" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-xs font-bold mt-2 transition">MUA NGAY</button>`
                            }
                        </div>
                    </div>
                `;
            });
        });

        async function buyNow(id, name, price) {
            const { value: contact } = await Swal.fire({
                title: 'Mua vật phẩm',
                text: `Xác nhận mua ${name} với giá ${price}đ?`,
                input: 'text',
                inputPlaceholder: 'Nhập Discord hoặc Link FB...',
                showCancelButton: true,
                confirmButtonColor: '#2563eb'
            });

            if (contact) {
                // Gửi Webhook cho Admin
                fetch("https://discord.com/api/webhooks/1488495008955764950/aAsOJlyIjYyN6qNOqqzu94BRyB6LpnmFhbMSjtsf28S2_BYU6fR9WOfTmfpEjMAA8HzP", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🛒 CÓ ĐƠN HÀNG MỚI!",
                            color: 3447003,
                            fields: [
                                { name: "Sản phẩm", value: name, inline: true },
                                { name: "ID Khách", value: myId, inline: true },
                                { name: "Liên hệ", value: contact }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                await db.collection("items").doc(id).update({ status: "pending", buyer_contact: contact });
                Swal.fire('Thành công', 'Vui lòng chờ Admin xác nhận đơn hàng.', 'success');
            }
        }

        function showQR() {
            Swal.fire({
                title: 'Nạp tiền qua Bank',
                html: `<div class='bg-white p-4 rounded-xl'><img src='https://img.vietqr.io/image/970422-0348704220-compact2.jpg?amount=0&addInfo=napbankkenshop%20${myId}' class='mx-auto'></div><p class='mt-4 text-sm'>Nội dung: <b>napbankkenshop ${myId}</b></p>`,
                showConfirmButton: false
            });
        }
    </script>
</body>
</html>
